name: Release

# Pending changesets → open/update a "chore: release" PR (version bumps +
# CHANGELOGs). No pending changesets → run the gate and publish packages.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC provenance / Trusted Publishing
      actions: write # dispatch deploy.yml after publish
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Node 24 ships npm >= 11.5.1, required for provenance and OIDC publishing.
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect pending changesets
        id: pending
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "publishing=$([ "$count" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        if: steps.pending.outputs.publishing == 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Type check
        if: steps.pending.outputs.publishing == 'true'
        run: bun run --filter './packages/*' typecheck

      - name: Test
        if: steps.pending.outputs.publishing == 'true'
        run: bun run test

      - name: Build packages
        if: steps.pending.outputs.publishing == 'true'
        run: bun run build:packages

      - name: Detect crates.io bootstrap token
        id: crates-bootstrap
        if: steps.pending.outputs.publishing == 'true'
        env:
          TOKEN: ${{ secrets.CRATES_IO_BOOTSTRAP_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io
        id: crates-auth
        if: steps.pending.outputs.publishing == 'true' && steps.crates-bootstrap.outputs.enabled != 'true'
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crates
        if: steps.pending.outputs.publishing == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_BOOTSTRAP_TOKEN || steps.crates-auth.outputs.token }}
        run: bun run publish:crates

      # changesets does not rewrite the workspace: protocol here, so pin it to
      # concrete versions before publish (ephemeral checkout; source is unchanged).
      - name: Pin workspace deps for npm publish
        if: steps.pending.outputs.publishing == 'true'
        run: bun scripts/rewrite-workspace-deps.ts

      - name: Release PR or publish
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: bun run version-packages
          publish: bunx changeset publish
          title: "chore: release"
          commit: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No npm token: auth is OIDC Trusted Publishing (configured per
          # package after the first manual publish creates it). id-token: write
          # above authorizes the exchange and signs provenance.
          NPM_CONFIG_PROVENANCE: "true"

      # GITHUB_TOKEN releases don't fire `on: release`, so dispatch directly.
      - name: Trigger deploy
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
