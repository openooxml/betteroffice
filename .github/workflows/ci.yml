name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  packages:
    name: Package gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run --filter './packages/*' typecheck

      - name: Test
        run: bun run test

      - name: Check minimal Wasm features
        run: cargo check -p xlsx-wasm --target wasm32-unknown-unknown --no-default-features

      - name: Build
        run: bun run build:packages

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Report all advisories
        run: bun audit
        continue-on-error: true

      - name: Fail on high or critical advisories
        run: bun audit --audit-level=high

  rust:
    name: Rust gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Detect Rust workspace
        id: ws
        run: echo "present=$([ -f Cargo.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.ws.outputs.present == 'true'
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        if: steps.ws.outputs.present == 'true'

      - name: Format check
        if: steps.ws.outputs.present == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: steps.ws.outputs.present == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        if: steps.ws.outputs.present == 'true'
        run: cargo test

      - name: License and advisory gate
        if: steps.ws.outputs.present == 'true'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories sources
